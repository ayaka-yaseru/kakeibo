<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ふたりの家計簿</title>
<meta name="theme-color" content="#F1F3EE">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ふたりの家計簿">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
  :root{
    --bg:#F1F3EE;
    --surface:#FFFFFF;
    --ink:#26332E;
    --ink-soft:#5B6B64;
    --accent:#3E6E64;
    --accent-soft:#DCEAE5;
    --stamp:#B33A3A;
    --stamp-soft:#F3DEDE;
    --line:#E1E5DF;
    --radius:18px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{
    font-family:'Noto Sans JP', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overscroll-behavior-y:none;
  }
  .tabular{font-variant-numeric:tabular-nums;}

  header.app-header{
    padding: calc(14px + var(--safe-top)) 20px 14px;
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg, var(--bg) 80%, rgba(241,243,238,0));
  }
  .brand{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:19px;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans JP', sans-serif;
    font-weight:400;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  main{
    flex:1;
    padding: 4px 20px calc(96px + var(--safe-bottom));
    max-width:520px;
    width:100%;
    margin:0 auto;
  }

  .error-banner{
    display:none;
    background:var(--stamp-soft);
    border:1px solid var(--stamp);
    color:var(--stamp);
    border-radius:12px;
    padding:12px 14px;
    font-size:12.5px;
    line-height:1.5;
    margin-bottom:14px;
    word-break:break-all;
  }
  .error-banner.show{display:block;}

  .view{display:none;}
  .view.active{display:block; animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  .card{
    background:var(--surface);
    border-radius:var(--radius);
    border:1px solid var(--line);
    padding:20px;
    margin-bottom:16px;
  }
  .card h3{
    margin:0 0 14px; font-size:13px; color:var(--ink-soft); font-weight:500;
  }

  label{
    display:block;
    font-size:12.5px;
    color:var(--ink-soft);
    margin:0 0 6px 2px;
    font-weight:500;
  }
  .field{margin-bottom:16px;}
  input[type=date], input[type=number], input[type=text], select{
    width:100%;
    font-family:'Noto Sans JP', sans-serif;
    font-size:16px;
    padding:13px 14px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:#FAFBFA;
    color:var(--ink);
    appearance:none;
    -webkit-appearance:none;
    min-height:48px;
  }
  select{
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="9"><path d="M1 1l6 6 6-6" stroke="%235B6B64" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
    background-repeat:no-repeat;
    background-position:right 14px center;
    padding-right:36px;
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .amount-field{position:relative;}
  .amount-field .yen{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:var(--ink-soft); font-size:16px; pointer-events:none;
  }
  .amount-field input{padding-left:32px; font-weight:700; font-size:18px;}

  button{
    font-family:'Zen Maru Gothic','Noto Sans JP', sans-serif;
    border:none;
    cursor:pointer;
  }
  .btn-primary{
    width:100%;
    background:var(--accent);
    color:#fff;
    font-size:16px;
    font-weight:700;
    padding:15px;
    border-radius:14px;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn-primary:active{transform:scale(.98); opacity:.9;}
  .btn-primary:disabled{opacity:.5;}
  .btn-ghost{
    width:100%;
    background:none;
    color:var(--ink-soft);
    font-size:14px;
    padding:12px;
    border-radius:12px;
    border:1.5px solid var(--line);
  }

  /* 集計タブ */
  .month-nav{
    display:flex; align-items:center; justify-content:center;
    gap:18px; margin-bottom:18px;
  }
  .month-nav button{
    background:var(--surface);
    border:1px solid var(--line);
    width:44px; height:44px; border-radius:50%;
    font-size:18px; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
  }
  .month-nav .month-label{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:700; font-size:17px;
    min-width:140px; text-align:center;
  }
  .refreshing{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    height:16px;
    margin:-10px 0 8px;
  }

  .stamp-total{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:26px 20px 24px;
    text-align:center;
  }
  .stamp-total .ring{
    width:88px; height:88px; border-radius:50%;
    border:3px solid var(--stamp);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:12px;
    position:relative;
  }
  .stamp-total .ring::before{
    content:"";
    position:absolute; inset:6px;
    border:1px solid var(--stamp);
    border-radius:50%;
  }
  .stamp-total .ring span{
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--stamp);
    font-weight:900;
    font-size:12px;
  }
  .stamp-total .total-label{font-size:12.5px; color:var(--ink-soft); margin-bottom:4px;}
  .stamp-total .total-amount{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:34px;
  }

  .chart-canvas-box{position:relative; height:210px;}
  .chart-canvas-box.short{height:170px;}
  .empty-note{
    text-align:center; color:var(--ink-soft); font-size:13px; padding:24px 0;
  }

  .cat-list{list-style:none; margin:0; padding:0;}
  .cat-list li{
    display:flex; align-items:center; gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .cat-list li:last-child{border-bottom:none;}
  .cat-list .dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
  .cat-list .name{flex:1; font-size:14px;}
  .cat-list .amt{font-weight:700; font-size:14px;}
  .cat-list .pct{font-size:11.5px; color:var(--ink-soft); width:40px; text-align:right;}

  /* 明細リスト */
  .entry-list{list-style:none; margin:0; padding:0;}
  .entry-date-head{
    font-size:11.5px;
    color:var(--ink-soft);
    font-weight:700;
    padding:12px 0 6px;
    border-bottom:1px solid var(--line);
  }
  .entry-list li.entry-row{
    display:flex; align-items:center; gap:10px;
    padding:11px 0;
    border-bottom:1px solid var(--line);
  }
  .entry-list li.entry-row:last-child{border-bottom:none;}
  .entry-row .entry-main{flex:1; min-width:0;}
  .entry-row .entry-cat{
    font-size:14px; font-weight:500;
  }
  .entry-row .entry-memo{
    font-size:11.5px; color:var(--ink-soft);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    margin-top:2px;
  }
  .entry-row .entry-amt{
    font-weight:700; font-size:15px; flex-shrink:0;
  }
  .entry-row .entry-actions{display:flex; gap:6px; flex-shrink:0;}
  .entry-row .entry-actions button{
    width:36px; height:36px;
    border-radius:10px;
    background:#FAFBFA;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    color:var(--ink-soft);
  }
  .entry-row .entry-actions button.danger{color:var(--stamp);}
  .entry-row .entry-actions svg{width:16px; height:16px;}
  .entry-row.pending{opacity:.45;}

  /* 修正モーダル */
  .modal-backdrop{
    display:none;
    position:fixed; inset:0;
    background:rgba(38,51,46,.45);
    z-index:40;
    align-items:flex-end;
    justify-content:center;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:var(--surface);
    width:100%;
    max-width:520px;
    border-radius:22px 22px 0 0;
    padding:22px 20px calc(22px + var(--safe-bottom));
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(40px); opacity:0;} to{transform:none; opacity:1;}}
  .modal h2{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:16px; font-weight:700;
    margin:0 0 18px;
  }
  .modal .modal-buttons{display:flex; gap:10px; margin-top:4px;}

  /* タブバー */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0;
    background:var(--surface);
    border-top:1px solid var(--line);
    display:flex;
    padding-bottom:var(--safe-bottom);
    z-index:20;
  }
  nav.tabbar button{
    flex:1;
    background:none;
    padding:12px 0 10px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--ink-soft);
    font-size:11px;
    font-weight:500;
  }
  nav.tabbar button.active{color:var(--accent);}
  nav.tabbar svg{width:22px; height:22px;}

  .toast{
    position:fixed; left:50%; bottom:calc(90px + var(--safe-bottom));
    transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:#fff;
    padding:10px 18px; border-radius:999px;
    font-size:13px; opacity:0; pointer-events:none;
    transition:all .25s ease;
    z-index:50;
    max-width:86vw;
    text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">ふたりの家計簿<small>月ごとにリセット・繰り越しなし</small></div>
</header>

<main>

  <div class="error-banner" id="error-banner"></div>

  <!-- 入力タブ -->
  <section id="view-input" class="view active">
    <div class="card">
      <div class="field">
        <label for="f-date">日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label for="f-category">費目</label>
        <select id="f-category">
          <option value="">読み込み中…</option>
        </select>
      </div>
      <div class="field">
        <label for="f-amount">金額</label>
        <div class="amount-field">
          <span class="yen">¥</span>
          <input type="number" id="f-amount" inputmode="numeric" placeholder="0" min="0">
        </div>
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label for="f-memo">メモ(任意)</label>
        <input type="text" id="f-memo" placeholder="例: スーパーで買い出し">
      </div>
      <button class="btn-primary" id="btn-submit" type="button">記録する</button>
    </div>
  </section>

  <!-- 集計タブ -->
  <section id="view-summary" class="view">
    <div class="month-nav">
      <button id="btn-prev-month" type="button" aria-label="前の月">‹</button>
      <div class="month-label" id="month-label">-</div>
      <button id="btn-next-month" type="button" aria-label="次の月">›</button>
    </div>
    <div class="refreshing" id="refreshing"></div>

    <div class="card stamp-total">
      <div class="ring"><span id="month-day-count">-</span></div>
      <div class="total-label">この月の合計支出(ふたり分)</div>
      <div class="total-amount tabular" id="total-amount">¥0</div>
    </div>

    <div class="card">
      <h3>費目別の内訳</h3>
      <div class="chart-canvas-box" id="chart-box">
        <canvas id="pie-chart"></canvas>
      </div>
      <div class="empty-note" id="empty-note" style="display:none;">まだこの月の記録がありません</div>
      <ul class="cat-list" id="cat-list" style="margin-top:14px;"></ul>
    </div>

    <div class="card">
      <h3>月別の支出推移(直近6ヶ月)</h3>
      <div class="chart-canvas-box short">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>明細(タップで修正・削除)</h3>
      <ul class="entry-list" id="entry-list"></ul>
      <div class="empty-note" id="entry-empty" style="display:none;">明細はありません</div>
    </div>
  </section>

</main>

<!-- 修正モーダル -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2>記録を修正</h2>
    <div class="field">
      <label for="m-date">日付</label>
      <input type="date" id="m-date">
    </div>
    <div class="field">
      <label for="m-category">費目</label>
      <select id="m-category"></select>
    </div>
    <div class="field">
      <label for="m-amount">金額</label>
      <div class="amount-field">
        <span class="yen">¥</span>
        <input type="number" id="m-amount" inputmode="numeric" min="0">
      </div>
    </div>
    <div class="field">
      <label for="m-memo">メモ(任意)</label>
      <input type="text" id="m-memo">
    </div>
    <div class="modal-buttons">
      <button class="btn-ghost" id="m-cancel" type="button">キャンセル</button>
      <button class="btn-primary" id="m-save" type="button">保存する</button>
    </div>
  </div>
</div>

<nav class="tabbar">
  <button id="tab-input" class="active" data-view="view-input" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    入力
  </button>
  <button id="tab-summary" data-view="view-summary" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v9l7 4"/></svg>
    集計
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============================================================
   GASウェブアプリのURL(設定済み)
   ============================================================ */
var API_URL = "https://script.google.com/macros/s/AKfycbwUY-ZlQ8SSTTdN5ezvjH6ej8xUEXlmExGqn5gwkYWQ_nnLmjce209SlZjxe44jSXA1wQ/exec";

var CAT_COLORS = ["#3E6E64","#B33A3A","#C98A3E","#5B7FA6","#8A6BAE","#5B9E6B","#C4577C","#7A8570","#4E96A8","#A6763E"];

var state = {
  categories: [],
  viewMonth: null,
  summaries: {},   // monthKey -> summaryデータ(キャッシュ)
  trend: null,
  editing: null    // { month, row } 修正中の明細
};
var pieChart = null;
var trendChart = null;

/* ---------- ユーティリティ ---------- */
function $(id){ return document.getElementById(id); }

function currentMonthKey(d){
  var date = d || new Date();
  return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
}
function todayISO(){
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function yen(n){
  return "¥" + Math.round(Number(n) || 0).toLocaleString("ja-JP");
}
function monthLabel(monthKey){
  var p = monthKey.split("-");
  return p[0] + "年 " + Number(p[1]) + "月";
}
function shortMonthLabel(monthKey){
  return Number(monthKey.split("-")[1]) + "月";
}
function daysInMonth(monthKey){
  var p = monthKey.split("-");
  return new Date(Number(p[0]), Number(p[1]), 0).getDate();
}
function dateLabel(iso){
  var p = iso.split("-");
  if(p.length < 3) return iso;
  var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  var w = ["日","月","火","水","木","金","土"][d.getDay()];
  return Number(p[1]) + "/" + Number(p[2]) + "(" + w + ")";
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(m){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m];
  });
}
function showToast(msg){
  var t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove("show"); }, 2600);
}
function showError(msg){
  var b = $("error-banner");
  b.textContent = msg;
  b.classList.add("show");
}
function hideError(){ $("error-banner").classList.remove("show"); }
function setRefreshing(on){
  $("refreshing").textContent = on ? "最新データを確認中…" : "";
}

/* ---------- ローカルキャッシュ(表示の高速化) ---------- */
function cacheSet(key, value){
  try{ localStorage.setItem("kakeibo_" + key, JSON.stringify(value)); }catch(e){}
}
function cacheGet(key){
  try{
    var raw = localStorage.getItem("kakeibo_" + key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

/* ---------- API 通信 ---------- */
function apiGet(params){
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  }).join("&");
  return fetch(API_URL + "?" + qs).then(function(res){
    if(!res.ok) throw new Error("通信エラー (HTTP " + res.status + ")");
    return res.json();
  });
}
function apiPost(payload){
  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  }).then(function(res){
    if(!res.ok) throw new Error("通信エラー (HTTP " + res.status + ")");
    return res.json();
  });
}

/* ---------- 費目 ---------- */
function renderCategoryOptions(){
  var html;
  if(state.categories.length === 0){
    html = '<option value="">費目がありません(費目マスタを確認)</option>';
  }else{
    html = state.categories.map(function(c){
      return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + "</option>";
    }).join("");
  }
  $("f-category").innerHTML = html;
  $("m-category").innerHTML = html;
}

/* ---------- 記録する(楽観的更新: 送信と同時に画面へ反映) ---------- */
function submitEntry(){
  var btn = $("btn-submit");
  var date = $("f-date").value;
  var category = $("f-category").value;
  var amount = Number($("f-amount").value);
  var memo = $("f-memo").value.trim();

  if(!date){ showToast("日付を入力してください"); return; }
  if(!category){ showToast("費目を選択してください"); return; }
  if(!amount || amount <= 0){ showToast("金額を入力してください"); return; }

  btn.disabled = true;
  btn.textContent = "記録中…";

  apiPost({ action: "add", date: date, category: category, amount: amount, memo: memo })
    .then(function(res){
      if(!res.ok) throw new Error(res.error || "記録に失敗しました");

      // ローカルの集計キャッシュに即時反映(サーバー再取得を待たない)
      applyLocalAdd(res.month, res.row, res.entry);

      $("f-amount").value = "";
      $("f-memo").value = "";
      showToast("記録しました");
    })
    .catch(function(err){
      showToast("エラー: " + err.message);
    })
    .then(function(){
      btn.disabled = false;
      btn.textContent = "記録する";
    });
}

function applyLocalAdd(month, row, entry){
  var s = state.summaries[month];
  if(!s) return; // まだ読み込んでいない月は次回取得時に反映される
  s.total += entry.amount;
  s.entries.unshift({ row: row, date: entry.date, category: entry.category, amount: entry.amount, memo: entry.memo });
  rebuildByCategory(s);
  cacheSet("summary_" + month, s);
  if(state.viewMonth === month) renderSummary(s);
  bumpTrendLocal(month, entry.amount);
}

function rebuildByCategory(s){
  var map = {};
  s.entries.forEach(function(e){
    map[e.category] = (map[e.category] || 0) + e.amount;
  });
  s.byCategory = Object.keys(map).map(function(name){
    return { name: name, total: map[name] };
  }).sort(function(a, b){ return b.total - a.total; });
}

function bumpTrendLocal(month, delta){
  if(!state.trend) return;
  for(var i = 0; i < state.trend.length; i++){
    if(state.trend[i].month === month){
      state.trend[i].total += delta;
      cacheSet("trend", state.trend);
      renderTrend();
      return;
    }
  }
}

/* ---------- 明細の削除 ---------- */
function deleteEntry(month, row){
  var s = state.summaries[month];
  var entry = null;
  if(s){
    for(var i = 0; i < s.entries.length; i++){
      if(s.entries[i].row === row){ entry = s.entries[i]; break; }
    }
  }
  if(!entry) return;
  if(!confirm(dateLabel(entry.date) + " " + entry.category + " " + yen(entry.amount) + " を削除します。よろしいですか?")) return;

  // 先に画面から消す(楽観的更新)
  s.entries = s.entries.filter(function(e){ return e.row !== row; });
  s.total -= entry.amount;
  rebuildByCategory(s);
  cacheSet("summary_" + month, s);
  renderSummary(s);
  bumpTrendLocal(month, -entry.amount);

  apiPost({ action: "delete", month: month, row: row })
    .then(function(res){
      if(!res.ok) throw new Error(res.error || "削除に失敗しました");
      showToast("削除しました");
    })
    .catch(function(err){
      showToast("削除エラー: " + err.message + " / 表示を元に戻します");
      loadSummary(month, true); // 失敗したらサーバーの正データで戻す
    });
}

/* ---------- 明細の修正(モーダル) ---------- */
function openEditModal(month, row){
  var s = state.summaries[month];
  if(!s) return;
  var entry = null;
  for(var i = 0; i < s.entries.length; i++){
    if(s.entries[i].row === row){ entry = s.entries[i]; break; }
  }
  if(!entry) return;

  state.editing = { month: month, row: row, before: entry };
  $("m-date").value = entry.date;
  $("m-category").value = entry.category;
  $("m-amount").value = entry.amount;
  $("m-memo").value = entry.memo || "";
  $("modal-backdrop").classList.add("show");
}
function closeEditModal(){
  state.editing = null;
  $("modal-backdrop").classList.remove("show");
}
function saveEdit(){
  if(!state.editing) return;
  var date = $("m-date").value;
  var category = $("m-category").value;
  var amount = Number($("m-amount").value);
  var memo = $("m-memo").value.trim();

  if(!date){ showToast("日付を入力してください"); return; }
  if(!category){ showToast("費目を選択してください"); return; }
  if(!amount || amount <= 0){ showToast("金額を入力してください"); return; }

  var target = state.editing;
  var btn = $("m-save");
  btn.disabled = true;
  btn.textContent = "保存中…";

  apiPost({ action: "update", month: target.month, row: target.row, date: date, category: category, amount: amount, memo: memo })
    .then(function(res){
      if(!res.ok) throw new Error(res.error || "修正に失敗しました");
      showToast("修正しました");
      closeEditModal();
      // 修正は行の移動を伴う場合があるので、関係する月をサーバーから取り直す
      loadSummary(target.month, true);
      if(res.month !== target.month) loadSummary(res.month, true);
      loadTrend(true);
    })
    .catch(function(err){
      showToast("エラー: " + err.message);
    })
    .then(function(){
      btn.disabled = false;
      btn.textContent = "保存する";
    });
}

/* ---------- 集計の読み込み(キャッシュ表示 → 裏で最新取得) ---------- */
function loadSummary(monthKey, forceNetwork){
  // 1. メモリ or localStorage のキャッシュがあれば即表示
  var cached = state.summaries[monthKey] || cacheGet("summary_" + monthKey);
  if(cached){
    state.summaries[monthKey] = cached;
    if(state.viewMonth === monthKey) renderSummary(cached);
  }

  // 2. 裏で最新データを取得して差し替え
  setRefreshing(true);
  apiGet({ action: "summary", month: monthKey })
    .then(function(data){
      if(!data.ok) throw new Error(data.error || "取得に失敗しました");
      state.summaries[monthKey] = data;
      cacheSet("summary_" + monthKey, data);
      if(state.viewMonth === monthKey) renderSummary(data);
    })
    .catch(function(err){
      if(!cached) showToast("読み込みエラー: " + err.message);
    })
    .then(function(){ setRefreshing(false); });
}

function renderSummary(data){
  $("month-label").textContent = monthLabel(state.viewMonth);
  $("month-day-count").textContent = daysInMonth(state.viewMonth) + "日間";
  $("total-amount").textContent = yen(data.total || 0);

  var byCategory = data.byCategory || [];
  var hasData = byCategory.length > 0;

  $("chart-box").style.display = hasData && typeof Chart !== "undefined" ? "block" : "none";
  $("empty-note").style.display = hasData ? "none" : "block";

  if(hasData && typeof Chart !== "undefined"){
    var labels = byCategory.map(function(c){ return c.name; });
    var values = byCategory.map(function(c){ return c.total; });
    var colors = labels.map(function(_, i){ return CAT_COLORS[i % CAT_COLORS.length]; });
    var ctx = $("pie-chart").getContext("2d");
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
      type: "doughnut",
      data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: "#fff" }] },
      options: { maintainAspectRatio: false, cutout: "62%", plugins: { legend: { display: false } } }
    });
    var total = data.total || 1;
    $("cat-list").innerHTML = byCategory.map(function(c, i){
      return "<li>" +
        '<span class="dot" style="background:' + colors[i] + '"></span>' +
        '<span class="name">' + escapeHtml(c.name) + "</span>" +
        '<span class="amt tabular">' + yen(c.total) + "</span>" +
        '<span class="pct">' + Math.round(c.total / total * 100) + "%</span>" +
        "</li>";
    }).join("");
  }else{
    $("cat-list").innerHTML = "";
    if(pieChart){ pieChart.destroy(); pieChart = null; }
  }

  renderEntries(data.entries || []);
}

/* ---------- 明細リスト ---------- */
function renderEntries(entries){
  var list = $("entry-list");
  var empty = $("entry-empty");
  if(entries.length === 0){
    list.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  var html = "";
  var lastDate = null;
  entries.forEach(function(e){
    if(e.date !== lastDate){
      html += '<li class="entry-date-head">' + dateLabel(e.date) + "</li>";
      lastDate = e.date;
    }
    html += '<li class="entry-row" data-row="' + e.row + '">' +
      '<div class="entry-main">' +
        '<div class="entry-cat">' + escapeHtml(e.category) + "</div>" +
        (e.memo ? '<div class="entry-memo">' + escapeHtml(e.memo) + "</div>" : "") +
      "</div>" +
      '<div class="entry-amt tabular">' + yen(e.amount) + "</div>" +
      '<div class="entry-actions">' +
        '<button type="button" data-act="edit" data-row="' + e.row + '" aria-label="修正">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>' +
        "</button>" +
        '<button type="button" class="danger" data-act="delete" data-row="' + e.row + '" aria-label="削除">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>' +
        "</button>" +
      "</div>" +
    "</li>";
  });
  list.innerHTML = html;
}

// 明細ボタンのイベント(リスト全体で受ける)
function onEntryListClick(ev){
  var btn = ev.target.closest ? ev.target.closest("button[data-act]") : null;
  if(!btn) return;
  var row = Number(btn.getAttribute("data-row"));
  var act = btn.getAttribute("data-act");
  if(act === "edit") openEditModal(state.viewMonth, row);
  if(act === "delete") deleteEntry(state.viewMonth, row);
}

/* ---------- 月別推移 ---------- */
function loadTrend(forceNetwork){
  var cached = state.trend || cacheGet("trend");
  if(cached){
    state.trend = cached;
    renderTrend();
  }
  apiGet({ action: "trend", endMonth: currentMonthKey() })
    .then(function(data){
      if(!data.ok) throw new Error(data.error || "推移の取得に失敗しました");
      state.trend = data.trend || [];
      cacheSet("trend", state.trend);
      renderTrend();
    })
    .catch(function(err){
      if(!cached) console.log("trend error", err);
    });
}

function renderTrend(){
  if(!state.trend || typeof Chart === "undefined") return;
  var labels = state.trend.map(function(t){ return shortMonthLabel(t.month); });
  var values = state.trend.map(function(t){ return t.total; });

  var ctx = $("trend-chart").getContext("2d");
  if(trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: values,
        borderColor: "#3E6E64",
        backgroundColor: "rgba(62,110,100,.10)",
        fill: true,
        tension: 0.3,
        pointBackgroundColor: "#3E6E64",
        pointRadius: 4
      }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(item){ return yen(item.parsed.y); }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            callback: function(v){ return v >= 10000 ? (v / 10000) + "万" : v.toLocaleString("ja-JP"); }
          }
        }
      }
    }
  });
}

/* ---------- 月ナビ・タブ ---------- */
function shiftMonth(delta){
  var p = state.viewMonth.split("-");
  var d = new Date(Number(p[0]), Number(p[1]) - 1 + delta, 1);
  state.viewMonth = currentMonthKey(d);
  $("month-label").textContent = monthLabel(state.viewMonth);
  loadSummary(state.viewMonth);
}

function switchTab(btn){
  var tabs = document.querySelectorAll("nav.tabbar button");
  var views = document.querySelectorAll(".view");
  var i;
  for(i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  for(i = 0; i < views.length; i++) views[i].classList.remove("active");
  btn.classList.add("active");
  $(btn.getAttribute("data-view")).classList.add("active");

  if(btn.getAttribute("data-view") === "view-summary"){
    loadSummary(state.viewMonth);
    loadTrend();
  }
}

/* ---------- 初期化 ---------- */
function init(){
  state.viewMonth = currentMonthKey();
  $("f-date").value = todayISO();
  $("month-label").textContent = monthLabel(state.viewMonth);

  // キャッシュから費目を即表示(初回起動以外は一瞬で使える)
  var cachedCats = cacheGet("categories");
  if(cachedCats && cachedCats.length){
    state.categories = cachedCats;
    renderCategoryOptions();
  }

  // イベント登録
  $("btn-submit").addEventListener("click", submitEntry);
  $("btn-prev-month").addEventListener("click", function(){ shiftMonth(-1); });
  $("btn-next-month").addEventListener("click", function(){ shiftMonth(1); });
  $("entry-list").addEventListener("click", onEntryListClick);
  $("m-cancel").addEventListener("click", closeEditModal);
  $("m-save").addEventListener("click", saveEdit);
  $("modal-backdrop").addEventListener("click", function(ev){
    if(ev.target === $("modal-backdrop")) closeEditModal();
  });

  var tabs = document.querySelectorAll("nav.tabbar button");
  for(var i = 0; i < tabs.length; i++){
    (function(btn){
      btn.addEventListener("click", function(){ switchTab(btn); });
    })(tabs[i]);
  }

  // 起動時に費目・今月集計・推移をまとめて取得(1リクエスト)
  apiGet({ action: "init" })
    .then(function(data){
      if(!data.ok) throw new Error(data.error || "初期化に失敗しました");
      hideError();
      state.categories = data.categories || [];
      cacheSet("categories", state.categories);
      renderCategoryOptions();

      var month = data.month || state.viewMonth;
      var summary = { total: data.total, byCategory: data.byCategory, entries: data.entries };
      state.summaries[month] = summary;
      cacheSet("summary_" + month, summary);
      if(state.viewMonth === month) renderSummary(summary);

      if(data.trend){
        state.trend = data.trend;
        cacheSet("trend", state.trend);
        renderTrend();
      }
    })
    .catch(function(err){
      if(!cachedCats){
        showError("サーバーに接続できませんでした: " + err.message +
          " / GAS側のデプロイ設定と、コード更新後の「新しいバージョン」での再デプロイを確認してください。");
        $("f-category").innerHTML = '<option value="">読み込み失敗(下の赤い表示を確認)</option>';
      }
    });
}

document.addEventListener("DOMContentLoaded", init);

window.addEventListener("error", function(ev){
  showError("アプリ内部エラー: " + (ev.message || "不明なエラー"));
});

/* ---------- Service Worker ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
